<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Ai-Cli | Website of Julian Jandeleit</title>
    <meta name="description" content="HiWi in AI4Grids Project at HTWG Konstanz.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://julianjandeleit.github.io/style.css">
    
    <!-- Dynamic color configuration from config.toml -->
    
    <style>
        :root {
            --primary-color: #39444C;
            --secondary-color: #008C8C;
            --accent-color: #98A6AD;
            --text-color: #2C2F33;
            --background-color: #F8F9FA;
            --card-background: #FFFFFF;
            --border-color: #D0D3D4;
            --light-background: #EDF0F2;
        }
        
        .dark-mode {
            --text-color: #E0E0E0;
            --background-color: #121212;
            --card-background: #1E1E1E;
            --border-color: #2C2C2C;
        }
        
        /* Footer link styling */
        .footer a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }
    </style>
    
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://julianjandeleit.github.io/favicon.ico">
    
    
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Mobile menu button -->
            <div class="nav-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <!-- Navigation links -->
            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <a href="https://julianjandeleit.github.io" class="nav-link"><i class="fas fa-home"></i></a>
                </li>
                
                    
                    <li class="nav-item">
                        <a href="https://julianjandeleit.github.io/projects" class="nav-link">Projects</a>
                    </li>
                    
                    <li class="nav-item">
                        <a href="https://julianjandeleit.github.io/photography" class="nav-link">Photography</a>
                    </li>
                    
                    <li class="nav-item">
                        <a href="https://julianjandeleit.github.io/music" class="nav-link">Music</a>
                    </li>
                    
                
                
                
            </ul>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
        
<div class="project-container">
    <h2>Ai-Cli</h2>
    <p>HiWi in AI4Grids Project at HTWG Konstanz.</p>
    
    <div class="project-content">
          <!-- Directly renders all content from the markdown -->
    </div>
</div>

<style>
.project-container {
    background-color: var(--card-background);
    padding: 2rem 3rem;  /* Increased padding for more space */
    border-radius: 0.5rem;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-color);
    max-width: 1000px;    /* Increased max-width for a more classic look */
    margin: 2rem auto;     /* Added top margin for spacing from the top */
}

.project-container h2 {
    margin-top: 0;         /* Remove top margin to minimize space */
    margin-bottom: 1rem;
}

.project-container p {
    margin-bottom: 1.5rem;  /* Increased bottom margin for paragraph spacing */
}

.project-content {
    text-align: justify;   /* Keep text justified for readability */
    line-height: 1.6;      /* Increased line height for better readability */
    font-size: 1.1em;      /* Slightly increases font size */
}
/* New CSS for images */
.project-content img {
    max-width: 100%;       /* Make images responsive */
    height: auto;          /* Maintain aspect ratio */
    border-radius: 0.5rem; /* Optional: add a border radius */
    box-shadow: var(--shadow); /* Optional: add shadow for effect */
    margin: 1rem 0;        /* Space out images from surrounding text */
}
</style>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p style="font-size: 0.8em;">&copy; 2025 Julian Jandeleit. <br> Built with <a href="https://www.getzola.org/">Zola</a> using the <a href="https://github.com/jskaza/peritus"><strong>peritus</strong></a> theme by <a href="https://jskaza.github.io/">Jonathan Skaza</a>.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // Mobile menu toggle
        const mobileMenu = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');
        
        mobileMenu.addEventListener('click', function() {
            mobileMenu.classList.toggle('is-active');
            navMenu.classList.toggle('active');
        });
        
        // Close mobile menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach(n => n.addEventListener('click', () => {
            mobileMenu.classList.remove('is-active');
            navMenu.classList.remove('active');
        }));
    </script>
</body>
</html>
